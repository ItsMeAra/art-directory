[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  PUBLIC_SITE_URL = "https://huntandhaul.artcollector.wtf"

# No SPA-style `/* → /index.html` redirect: it intercepts POST requests and breaks Netlify Forms
# (AJAX POST to `/` returned 404). Astro builds real routes (`/`, `/submit/`) so a catch‑all isn’t needed.

[[redirects]]
  from = "/faq"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/faq/"
  to = "/about/"
  status = 301
